name: CI-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Les tests CI utilisent un PostgreSQL éphémère local (isolé).
  # En production, le backend se connecte à PostgreSQL managé (Neon)
  # via DATABASE_URL défini dans le .env du serveur — jamais touché par la CI.
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: healthdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d healthdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/healthdb
      SECRET_KEY: ci-test-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint Python (ruff)
        run: |
          ruff check backend/app backend/migrations airflow/dags
          ruff format --check backend/app backend/migrations airflow/dags

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 1

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"

          if ! npm ci --no-audit --no-fund; then
            echo "npm ci failed, retrying after cache verification..."
            npm cache verify || true

            if ! npm ci --no-audit --no-fund; then
              echo "Second npm ci failed, falling back to npm install."
              npm install --no-audit --no-fund
            fi
          fi

      - name: Lint TypeScript / Vue (ESLint)
        working-directory: Frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        working-directory: Frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: Frontend/coverage/lcov.info
          retention-days: 1

  test-microservice-ia:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: healthai_ia_ci
      ML_FAST_TRAIN: "1"
      ML_CV_FOLDS: "3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: microservice_ia/requirements.txt

      - name: Install dependencies
        working-directory: microservice_ia
        run: pip install -r requirements.txt

      - name: Initialise MongoDB (index / migration)
        working-directory: microservice_ia
        run: python scripts/init_mongodb.py

      - name: Run microservice_ia tests
        working-directory: microservice_ia
        run: python -m pytest -v

  # Analyse SonarQube complète du dépôt (backend, frontend, Airflow, scripts, CI)
  # à chaque push sur main, après génération des rapports de couverture.
