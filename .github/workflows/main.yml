  #         grep -E '^sonar\.projectKey=' sonar-project.properties

  #     - name: SonarQube Scan (dépôt complet)
  #       uses: SonarSource/sonarqube-scan-action@v7
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}

  # Déploiement SSH : le serveur utilise son .env (DATABASE_URL Neon, SECRET_KEY, etc.).
  # Ordre deploy : MongoDB → init index → microservice_ia → minio/backend/frontend.
  deploy:
    needs: [test-backend, test-frontend, test-microservice-ia]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::SSH_HOST manquant. Ajoutez le secret GitHub SSH_HOST avec l'IP ou le nom DNS du serveur, sans protocole."
            exit 1
          fi

          mkdir -p ~/.ssh
          PORT="${SSH_PORT:-22}"

          echo "Ajout de la clé hôte SSH pour $SSH_HOST:$PORT"
          if ! ssh-keyscan -T 15 -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Impossible de récupérer la clé SSH du serveur. Vérifiez SSH_HOST, SSH_PORT, DNS/IP, firewall et service sshd."
            exit 1
          fi

      - name: Deploy to production
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          PATH_ON_SERVER="${DEPLOY_PATH:-/opt/HEALTHAIMSRP}"
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -p "$PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$PATH_ON_SERVER' bash -s" < scripts/deploy.sh
