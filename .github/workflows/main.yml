# Nom du workflow (affiché dans l'onglet Actions de GitHub)
name: CI-CD Pipeline

# Déclencheurs (Events)
on:
  pull_request:
    branches: [ "main" ]   

# Liste des tâches à accomplir
jobs:
  build-and-test:
    # Environnement d'exécution (Runner)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du dépôt sur le runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      # 3. Installer les dépendances frontend
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      # 4. Build le frontend (vérifie qu'il n'y a pas d'erreurs de compilation)
      - name: Build frontend
        working-directory: Frontend
        run: npm run build

