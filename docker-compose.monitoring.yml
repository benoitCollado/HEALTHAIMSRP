services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: healthaim_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-127.0.0.1:9090}:9090"
    networks:
      - health_net

  loki:
    image: grafana/loki:3.2.1
    container_name: healthaim_loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-127.0.0.1:3100}:3100"
    networks:
      - health_net

  promtail:
    image: grafana/promtail:3.2.1
    container_name: healthaim_promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ./data/logs/backend:/var/log/backend:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - health_net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: healthaim_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-127.0.0.1:3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - health_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: healthaim_node_exporter
    restart: always
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_PORT:-127.0.0.1:9100}:9100"
    networks:
      - health_net

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: healthaim_blackbox
    restart: always
    ports:
      - "${BLACKBOX_PORT:-127.0.0.1:9115}:9115"
    networks:
      - health_net

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  health_net:
    external: true
    name: ${COMPOSE_NETWORK_NAME:-healthaimsrp_health_net}