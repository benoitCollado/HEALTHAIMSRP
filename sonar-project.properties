# =============================================================================
# SonarQube / SonarCloud — HealthAI MSPR (analyse complète du dépôt)
# =============================================================================
# Prérequis GitHub Secrets :
#   - SONAR_TOKEN (obligatoire)
#   - SONAR_HOST_URL (serveur auto-hébergé uniquement ; inutile pour SonarCloud)
# =============================================================================

sonar.projectKey=HEALTHAIMSRP
sonar.projectName=HealthAI MSPR

# SonarCloud uniquement — décommenter et adapter :
# sonar.organization=benoitCollado

# Analyse de tout le dépôt (racine), avec exclusions ciblées
sonar.sources=.

sonar.tests=backend/app/tests,Frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/test_*.py

# Exclusions : dépendances, artefacts de build, données, docs, mobile natif
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  **/coverage/**,\
  **/coverage_html/**,\
  Frontend/coverage/**,\
  backend/coverage.xml,\
  **/package-lock.json,\
  **/*.d.ts,\
  Frontend/ios/**,\
  Frontend/android/**,\
  Frontend/src/data/**,\
  data/**,\
  database/**,\
  docs/**,\
  lancement/**,\
  Divers/**,\
  **/*.bak,\
  **/*.csv,\
  **/*.html,\
  **/*.md,\
  **/.git/**,\
  **/.cursor/**,\
  **/.github/**/README.md

sonar.sourceEncoding=UTF-8

# --- Python (backend + Airflow + scripts) ---
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# --- JavaScript / TypeScript / Vue (frontend) ---
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=Frontend/coverage/lcov.info

# Fichiers Vue analysés comme TypeScript
sonar.lang.patterns.ts=**/*.ts,**/*.tsx,**/*.vue
