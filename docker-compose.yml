services:
  postgres:
    image: postgres:17
    container_name: postgres_health
    restart: always
    environment:
      POSTGRES_DB: healthdb
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: healthpass
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5435}:5432"
    volumes:
      - ./database/db:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - health_net

  backend:
    build: ./backend
    env_file:
      - .env
    container_name: backend_api
    restart: always
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8089}:8000"
    environment:
      DATABASE_URL: postgresql://healthuser:healthpass@postgres:5432/healthdb
      SECRET_KEY: ${SECRET_KEY:-healthaim-secret-key-dev-change-in-production}
    networks:
      - health_net

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: frontend_nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:89}:80"
    networks:
      - health_net

  seed:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: postgresql://healthuser:healthpass@postgres:5432/healthdb
      DATA_DIR: /data
    command: python /data/seed_db.py
    networks:
      - health_net
    profiles:
      - seed

  # Init permissions pour le dossier export (Airflow doit pouvoir écrire, vous pourrez lire)
  export-init:
    image: alpine
    container_name: export_init
    user: root
    volumes:
      - ./data/export:/opt/airflow/export
    command: sh -c "mkdir -p /opt/airflow/export && chmod 777 /opt/airflow/export"
    networks:
      - health_net
    restart: "no"

  # Airflow - base de métadonnées
  postgres_airflow:
    image: postgres:17
    container_name: postgres_airflow
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - health_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Airflow - initialisation (une fois)
  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    networks:
      - health_net

  # Airflow - webserver
  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_webserver
    hostname: airflow-webserver
    restart: always
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      export-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-healthaim-airflow-secret-key-dev}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      NO_PROXY: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      no_proxy: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
      AIRFLOW_CONN_HEALTHAIM_POSTGRES: postgresql://healthuser:healthpass@postgres:5432/healthdb
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data/export:/opt/airflow/export
    command: webserver
    networks:
      - health_net

  # Airflow - scheduler
  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_scheduler
    hostname: airflow-scheduler
    restart: always
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      export-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-healthaim-airflow-secret-key-dev}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      NO_PROXY: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      no_proxy: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
      AIRFLOW_CONN_HEALTHAIM_POSTGRES: postgresql://healthuser:healthpass@postgres:5432/healthdb
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data/export:/opt/airflow/export
    command: scheduler
    networks:
      - health_net


volumes:
  airflow_db_data:

networks:
  health_net:
