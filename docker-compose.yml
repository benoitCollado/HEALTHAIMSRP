services:
  backend:
    image: healthaimsrp-backend
    build: ./backend
    env_file:
      - .env
    container_name: backend_api
    restart: always
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8089}:8000"
    depends_on:
      - minio
    volumes:
      - ./data:/data
      - ./data/logs/backend:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      API_ROOT_PATH: ${API_ROOT_PATH:-/api}
      DATA_DIR: /data
      LOG_DIR: /app/logs
      KEY_MISTRAL_API: ${KEY_MISTRAL_API:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-127.0.0.1:9100}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-healthai}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-healthai-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-healthai-chat-images}
      AIRFLOW_API_URL: ${AIRFLOW_API_URL:-http://host.docker.internal:8080}
      AIRFLOW_USER: ${AIRFLOW_USER:-airflow}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    command: >
      bash -c "
        if [ -f /data/seed_db.py ]; then python /data/seed_db.py || true; fi &&
        exec ./start.sh
      "
    networks:
      - health_net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio_healthai
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-127.0.0.1:9100}:9000"
      - "${MINIO_CONSOLE_PORT:-127.0.0.1:9101}:9001"
    networks:
      - health_net

  # Seed des données initiales (CSV clean/ → PostgreSQL)
  # Prérequis: postgres démarré, fichiers dans data/clean/
  seed:
    image: healthaimsrp-backend
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      DATA_DIR: /data
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
    network_mode: host
    profiles:
      - seed
    command: python /data/seed_db.py

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_AIRFLOW_UI_URL: ${VITE_AIRFLOW_UI_URL:-127.0.0.1:8080}
    container_name: frontend_nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:89}:80"
    networks:
      - health_net

  # Init permissions pour les dossiers export et intermediate (Airflow doit pouvoir écrire)
  export-init:
    image: alpine
    container_name: export_init
    user: root
    volumes:
      - ./data/export:/opt/airflow/export
      - ./data/intermediate:/opt/airflow/intermediate
      - ./data/ml:/opt/airflow/ml
    command: sh -c "mkdir -p /opt/airflow/export /opt/airflow/intermediate/import /opt/airflow/intermediate/export /opt/airflow/ml && chmod -R 777 /opt/airflow/export /opt/airflow/intermediate /opt/airflow/ml"
    networks:
      - health_net
    restart: "no"

  # Airflow - base de métadonnées
  postgres_airflow:
    image: postgres:17
    container_name: postgres_airflow
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - health_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Airflow - initialisation (une fois)
  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    networks:
      - health_net

  # Airflow - webserver
  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_webserver
    hostname: airflow-webserver
    restart: always
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      export-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-healthaim-airflow-secret-key-dev}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      NO_PROXY: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      no_proxy: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
      AIRFLOW_CONN_HEALTHAIM_POSTGRES: ${DATABASE_URL:?DATABASE_URL must be set}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data/export:/opt/airflow/export
      - ./data/intermediate:/opt/airflow/intermediate
      - ./data/ml:/opt/airflow/ml
    command: webserver
    networks:
      - health_net

  # Airflow - scheduler
  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow_scheduler
    hostname: airflow-scheduler
    restart: always
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      export-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-healthaim-airflow-secret-key-dev}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      NO_PROXY: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      no_proxy: "localhost,127.0.0.1,airflow-scheduler,airflow-webserver,.health_net"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http apache-airflow-providers-postgres requests"
      AIRFLOW_CONN_HEALTHAIM_POSTGRES: ${DATABASE_URL:?DATABASE_URL must be set}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data/export:/opt/airflow/export
      - ./data/intermediate:/opt/airflow/intermediate
      - ./data/ml:/opt/airflow/ml
    command: scheduler
    networks:
      - health_net


volumes:
  airflow_db_data:
  minio_data:

networks:
  health_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
